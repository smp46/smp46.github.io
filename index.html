<!DOCTYPE html>
<html>

<head>
    <title>Text Summarization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 2%;
            background-color: #fafafa;
            background-image: url("https://www.transparenttextures.com/patterns/black-thread-light.png");
        }

        h1 {
            background-color: #4CAF50;
            color: white;
            margin: 0;
            padding: 20px;
            font-size: 36px;
            margin-bottom: 20px;
        }
        

        #input,
        #output {
            width: calc(50% - 22px);
            height: 75vh;
            padding: 10px;
            margin: 10px;
            box-sizing: border-box;
            float: left;
        }

        #summarize-button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        #summarize-button:hover {
            background-color: #45a049;
        }

        #clear-output-button {
            background-color: #f44336;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #clear-output-button:hover {
            background-color: #e53935;
        }

        #progress-bar {
            width: 100%;
            height: 20px;
            background-color: #ddd;
            margin: 10px 0;
        }

        #progress-bar-inner {
            width: 0%;
            height: 100%;
            background-color: #4caf50;
        }

        #prompt-input {
            width: calc(50% - 22px);
            box-sizing: border-box;
            padding: 10px;
            margin: 10px;
        }
        .loader {
        border: 16px solid #f3f3f3;
        border-top: 16px solid #00ff2a;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        margin-left: -78px;
        animation: spin 2s linear infinite;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        }
        .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: 0 0 0 0.5;
        z-index: 9998;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
        font-size: 28px;
        margin-bottom: 16px;
        }

        /* Add hover and focus states to interactive elements */
        button:hover,
        button:focus,
        a:hover,
        a:focus {
        background-color: #eee;
        outline: none;
        }
    
        button {
        margin: 0 10px;
        }
    </style>
</head>

<body>

    <h1>Text Summarization</h1>
    
    <textarea id="input" placeholder="Please input the text you would like summarized here"></textarea>
    <textarea id="output" readonly placeholder="This is where the summary of the text will go"></textarea>
    
    <div style="text-align: center;">
        <button id="summarize-button">Summarize</button>
        <button id="clear-output-button">Clear Output</button>
    </div>
    

    <div class="overlay" id="overlay" style="display:none;"></div>
    <div class="loader" id="loader" style="display:none;"></div>
    <script>
        const summarizeButton = document.querySelector("#summarize-button");
        const inputField = document.querySelector("#input");
        const outputField = document.querySelector("#output");
        const loader = document.querySelector("#loader");
        const overlay = document.querySelector("#overlay");

        summarizeButton.addEventListener("click", async () => {
            overlay.style.display = "block";
            loader.style.display = "block";
            let textToSummarize = inputField.value;
            textToSummarize = "Succinctly summarize the following text so it is at most half the size of the original: " + textToSummarize;
            const createChatResponse = await fetch("http://103.216.220.24:56926/api/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
            });
            let chatId = await createChatResponse.text();
            chatId = chatId.replace(/"/g, "");
            const askQuestionResponse = await fetch(`http://103.216.220.24:56926/api/chat/${chatId}/question?prompt=${encodeURIComponent(textToSummarize)}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
            });
            const data = await askQuestionResponse.json();
            outputField.value = data.answer;
            overlay.style.display = "none";
            loader.style.display = "none";
        });
    </script>
</body>

</html>
